<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { margin: 0; padding: 0; }
    html, body { height: 100%; }
    iframe {
      display: block;
      width: 100%;
      height: 100vh;
      border: none;
    }
  </style>
</head>
<body>
  <iframe 
    src="https://script.google.com/macros/s/AKfycbz8mqr6fLqqnZl2HZoihohNSkpTyfHOzAqh4KicQwt21Ofk0ku7XfJzxOvQNv8TsvtGAw/exec"
    scrolling="yes">
  </iframe>
  <script>
    window.addEventListener('message', function(e) {
      const iframe = document.querySelector('iframe');
      if (e.data && e.data.height) {
        iframe.style.height = e.data.height + 'px';
      }
    });
  </script>
</body>
</html>
